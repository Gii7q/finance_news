name: 测试每日汇总

on:
  workflow_dispatch:

jobs:
  test-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml
          pip install openai
      
      - name: 修复数据库表结构
        run: |
          if [ -f "finance.db" ]; then
            sqlite3 finance.db "ALTER TABLE news ADD COLUMN source TEXT;" 2>/dev/null || echo "source 列已存在"
            sqlite3 finance.db "ALTER TABLE news ADD COLUMN ai_summary TEXT;" 2>/dev/null || echo "ai_summary 列已存在"
            echo "✅ 数据库表结构已修复"
          else
            echo "⚠️ finance.db 不存在，跳过修复"
          fi
      
      - name: 抓取最新新闻
        run: |
          echo "========== 开始抓取 =========="
          python main.py
          echo "========== 抓取完成 =========="
          echo "--- 检查数据库 ---"
          sqlite3 finance.db "SELECT COUNT(*) FROM news;"
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
      
      - name: 创建并发送汇总
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > test_today.py << 'EOF'
          import sqlite3
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.header import Header
          from datetime import datetime, timedelta
          import os

          SENDER_EMAIL = os.getenv('SENDER_EMAIL')
          SENDER_PASSWORD = os.getenv('SENDER_PASSWORD')
          SMTP_SERVER = os.getenv('SMTP_SERVER', 'smtp.qq.com')
          SMTP_PORT = int(os.getenv('SMTP_PORT', 465))
          TEST_EMAIL = '3215972859@qq.com'

          if not os.path.exists('finance.db'):
              print('❌ finance.db 不存在')
              exit(1)

          conn = sqlite3.connect('finance.db')
          c = conn.cursor()
          c.execute('SELECT title, link, published, summary FROM news ORDER BY id DESC LIMIT 30')
          rows = c.fetchall()
          conn.close()

          if not rows:
              print('❌ 数据库中没有新闻')
              exit(1)

          print(f'✅ 找到 {len(rows)} 条新闻')

          beijing_now = datetime.utcnow() + timedelta(hours=8)
          today_str = beijing_now.strftime('%Y年%m月%d日')

          html = '<h2 style="color:#1a1a2e;">📋 ' + today_str + ' 新闻汇总</h2>'
          html += '<p style="color:#666;">共 ' + str(len(rows)) + ' 条新闻</p>'
          html += '<hr style="border: 1px solid #eee;">'

          # AI 概述
          try:
              import openai
              api_key = os.getenv('DEEPSEEK_API_KEY')
              if api_key:
                  titles = [row[0] for row in rows[:20]]
                  titles_text = "\n".join(titles)
                  client = openai.OpenAI(
                      api_key=api_key,
                      base_url="https://api.deepseek.com/v1"
                  )
                  response = client.chat.completions.create(
                      model="deepseek-chat",
                      messages=[
                          {"role": "system", "content": "你是一个金融新闻编辑，请用150字以内概括以下新闻的整体趋势和重点。"},
                          {"role": "user", "content": "请概括以下新闻：\n" + titles_text}
                      ],
                      temperature=0.5,
                      max_tokens=200
                  )
                  ai_summary = response.choices[0].message.content.strip()
                  if ai_summary:
                      html += '<div style="background:#f0f7ff; padding:16px 20px; border-radius:8px; border-left:4px solid #2980b9; margin:16px 0;">'
                      html += '<p style="margin:0; color:#1a1a2e; font-size:15px; line-height:1.8;">🤖 <strong>AI 概述：</strong>' + ai_summary + '</p>'
                      html += '</div>'
          except Exception as e:
              print('⚠️ AI 概述生成失败:', e)

          # 目录
          html += '<h3 style="color:#1a1a2e; margin-top:20px;">📑 目录</h3>'
          html += '<div style="border-left: 4px solid #2980b9; padding-left: 20px; margin-top: 10px;">'

          for idx, row in enumerate(rows, 1):
              html += '<div style="margin-bottom: 18px;">'
              html += '<a href="' + row[1] + '" style="color:#2980b9; text-decoration:none; font-size:15px; font-weight:500;">' + str(idx) + '. ' + row[0] + '</a>'
              html += '<div style="color:#999; font-size:12px; margin-top:4px;">🕐 ' + row[2] + '</div>'
              html += '</div>'

          html += '</div>'
          html += '<hr style="border: 1px solid #eee; margin-top:20px;">'
          html += '<p style="color:gray; font-size:12px;">⚠️ 本简报仅供参考，不构成投资建议。</p>'
          html += '<p style="color:#888; font-size:12px;">📧 如需取消订阅，请访问 <a href="https://ppy.pythonanywhere.com" style="color:#2980b9; text-decoration:none;">ppy.pythonanywhere.com</a></p>'

          try:
              msg = MIMEMultipart()
              msg['From'] = SENDER_EMAIL
              msg['To'] = TEST_EMAIL
              msg['Subject'] = Header('📋 新闻汇总 ' + beijing_now.strftime('%Y-%m-%d'), 'utf-8')
              msg.attach(MIMEText(html, 'html', 'utf-8'))
              with smtplib.SMTP_SSL(SMTP_SERVER, SMTP_PORT) as server:
                  server.login(SENDER_EMAIL, SENDER_PASSWORD)
                  server.sendmail(SENDER_EMAIL, [TEST_EMAIL], msg.as_string())
              print('✅ 新闻汇总已发送到 ' + TEST_EMAIL)
          except Exception as e:
              print('❌ 发送失败:', e)
              exit(1)
          EOF
          
          python test_today.py
