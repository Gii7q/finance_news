name: 测试每日汇总

on:
  workflow_dispatch:

jobs:
  test-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml
      
      - name: 创建测试脚本
        run: |
          cat > test_summary.py << 'EOF'
import sqlite3
import smtplib
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
from email.header import Header
from datetime import datetime, timedelta
import os

SENDER_EMAIL = os.getenv('SENDER_EMAIL')
SENDER_PASSWORD = os.getenv('SENDER_PASSWORD')
SMTP_SERVER = os.getenv('SMTP_SERVER', 'smtp.qq.com')
SMTP_PORT = int(os.getenv('SMTP_PORT', 465))
TEST_EMAIL = '3215972859@qq.com'

if not os.path.exists('finance.db'):
    print('❌ finance.db 不存在')
    exit(1)

conn = sqlite3.connect('finance.db')
c = conn.cursor()
beijing_now = datetime.utcnow() + timedelta(hours=8)
yesterday = (beijing_now - timedelta(days=1)).strftime('%Y-%m-%d')
c.execute('SELECT title, link, published, summary FROM news WHERE substr(created_at, 1, 10) = ? ORDER BY id DESC', (yesterday,))
rows = c.fetchall()
conn.close()

if not rows:
    print('❌ 昨日无新闻')
    exit(1)

print(f'✅ 找到 {len(rows)} 条新闻')

today_str = (beijing_now - timedelta(days=1)).strftime('%Y年%m月%d日')
html = '<h2>📋 ' + today_str + ' 整日汇总</h2>'
html += '<p>共 ' + str(len(rows)) + ' 条新闻</p><hr>'

html += '<h3>📑 目录</h3><ul>'
for idx, row in enumerate(rows, 1):
    html += '<li><a href=\"' + row[1] + '\" style=\"color:#2980b9;\">' + row[0] + '</a> <small style=\"color:#888;\">(' + row[2] + ')</small></li>'
html += '</ul><hr>'

html += '<h3>📰 详细新闻</h3>'
for idx, row in enumerate(rows[:20], 1):
    html += '<div style=\"margin-bottom:12px; padding:8px; border-left:2px solid #ddd;\">'
    html += '<h4 style=\"margin:0 0 4px 0;\">' + str(idx) + '. <a href=\"' + row[1] + '\" style=\"color:#2980b9;\">' + row[0] + '</a></h4>'
    if row[3]:
        html += '<p style=\"color:#555; font-size:13px; margin:4px 0;\">' + row[3][:150] + '...</p>'
    html += '<small style=\"color:#888;\">🕐 ' + row[2] + '</small>'
    html += '</div>'

html += '<p style=\"color:gray;\">⚠️ 本简报仅供参考，不构成投资建议。</p>'

try:
    msg = MIMEMultipart()
    msg['From'] = SENDER_EMAIL
    msg['To'] = TEST_EMAIL
    msg['Subject'] = Header('📋 每日新闻汇总 ' + (beijing_now - timedelta(days=1)).strftime('%Y-%m-%d'), 'utf-8')
    msg.attach(MIMEText(html, 'html', 'utf-8'))
    with smtplib.SMTP_SSL(SMTP_SERVER, SMTP_PORT) as server:
        server.login(SENDER_EMAIL, SENDER_PASSWORD)
        server.sendmail(SENDER_EMAIL, [TEST_EMAIL], msg.as_string())
    print('✅ 每日汇总已发送到 ' + TEST_EMAIL)
except Exception as e:
    print('❌ 发送失败:', e)
    exit(1)
EOF
      
      - name: 运行测试
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python test_summary.py
