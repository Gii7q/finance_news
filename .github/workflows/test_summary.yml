name: 测试每日汇总

on:
  workflow_dispatch:

jobs:
  test-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml
      
      - name: 抓取最新新闻（带调试）
        run: |
          echo "========== 开始抓取 =========="
          python main.py
          echo "========== 抓取完成 =========="
          echo "--- 检查数据库 ---"
          sqlite3 finance.db "SELECT COUNT(*) FROM news;"
          sqlite3 finance.db "SELECT title, created_at FROM news ORDER BY id DESC LIMIT 5;"
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
      
      - name: 查看今日汇总
        run: |
          python -c "
          import sqlite3
          from datetime import datetime, timedelta
          conn = sqlite3.connect('finance.db')
          c = conn.cursor()
          beijing_now = datetime.utcnow() + timedelta(hours=8)
          today = beijing_now.strftime('%Y-%m-%d')
          c.execute('SELECT COUNT(*) FROM news WHERE substr(created_at, 1, 10) = ?', (today,))
          count = c.fetchone()[0]
          print(f'今日新闻数: {count}')
          conn.close()
          "
