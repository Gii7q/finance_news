name: 测试每日汇总

on:
  workflow_dispatch:

jobs:
  test-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml
      
      # 👇 新增：在抓取之前修复数据库
      - name: 修复数据库表结构
        run: |
          if [ -f "finance.db" ]; then
            sqlite3 finance.db "ALTER TABLE news ADD COLUMN source TEXT;" 2>/dev/null || echo "source 列已存在"
            sqlite3 finance.db "ALTER TABLE news ADD COLUMN ai_summary TEXT;" 2>/dev/null || echo "ai_summary 列已存在"
            echo "✅ 数据库表结构已修复"
          fi
      
      - name: 抓取最新新闻
        run: |
          echo "========== 开始抓取 =========="
          python main.py
          echo "========== 抓取完成 =========="
          echo "--- 检查数据库 ---"
          sqlite3 finance.db "SELECT COUNT(*) FROM news;"
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
      
      # ... 后续步骤
      
      - name: 查看今日汇总
        run: |
          python -c "
          import sqlite3
          from datetime import datetime, timedelta
          conn = sqlite3.connect('finance.db')
          c = conn.cursor()
          beijing_now = datetime.utcnow() + timedelta(hours=8)
          today = beijing_now.strftime('%Y-%m-%d')
          c.execute('SELECT COUNT(*) FROM news WHERE substr(created_at, 1, 10) = ?', (today,))
          count = c.fetchone()[0]
          print(f'今日新闻数: {count}')
          conn.close()
          "
