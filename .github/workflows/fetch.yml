name: 每日自动抓取新闻

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml
      
      - name: 抓取新闻并发送邮件
        run: python main.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
      
      - name: 上传数据库到 PythonAnywhere
        env:
          PA_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
        run: |
          if [ -f "finance.db" ]; then
            curl -X POST \
              -H "Authorization: Token ${PA_TOKEN}" \
              -F "content=@finance.db" \
              -F "path=/home/ppy/mysite/finance.db" \
              https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/files/path/home/ppy/mysite/finance.db
            echo "✅ 数据库上传成功"
          else
            echo "❌ finance.db 不存在"
          fi
      
      - name: 重载网站
        env:
          PA_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Token ${PA_TOKEN}" \
            https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/webapps/ppy.pythonanywhere.com/reload/
          echo "✅ 网站已重载"
      
      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: finance-db
          path: finance.db
