name: 每日自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次（UTC时间整点）
  workflow_dispatch:      # 支持手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml yfinance
      
      # 4. 抓取新闻并发送邮件
      - name: 抓取新闻并发送邮件
        run: |
          echo "========== 开始执行 main.py =========="
          python main.py
          echo "========== main.py 执行完毕 =========="
          echo "--- 检查数据库内容 ---"
          echo "新闻总数: $(sqlite3 finance.db 'SELECT COUNT(*) FROM news;')"
          echo "订阅者总数: $(sqlite3 finance.db 'SELECT COUNT(*) FROM subscribers;')"
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          API_SECRET: ${{ secrets.API_SECRET }}
      
      # 5. 重载 PythonAnywhere 网站（确保新数据生效）
      - name: 重载网站
        env:
          PA_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
        run: |
          echo "🔄 正在重载 PythonAnywhere 网站..."
          curl -X POST \
            -H "Authorization: Token ${PA_TOKEN}" \
            https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/webapps/ppy.pythonanywhere.com/reload/
          echo "✅ 网站已重载"
      
      # 6. 备份数据库 (保留现场，方便排查)
      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: finance-db-backup
          path: finance.db
